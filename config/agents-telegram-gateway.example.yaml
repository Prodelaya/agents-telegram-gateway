app:
  name: agents-telegram-gateway
  # Use an absolute path. Shell-style ~ expansion is not applied by YAML parsing.
  dataDir: /absolute/path/to/.local/share/agents-telegram-gateway

telegram:
  botTokenEnv: TELEGRAM_BOT_TOKEN
  allowedUserIdsEnv: ALLOWED_TELEGRAM_USER_IDS

workspace:
  # Use an absolute path to the workspace root that contains allowlisted projects.
  baseDir: /absolute/path/to/projects
  discovery:
    maxDepth: 3
    markers:
      - .git
      - opencode.json
      - opencode.jsonc
      - AGENTS.md
      - package.json
      - pyproject.toml

agents:
  defaultAdapter: opencode
  defaultAgent: gentle-orchestrator

opencode:
  host: 127.0.0.1
  portRange:
    from: 4100
    to: 4199
  serverPasswordEnv: OPENCODE_SERVER_PASSWORD
  command: opencode
  startupTimeoutMs: 15000
  configOverlay:
    default_agent: gentle-orchestrator

telegramFormatting:
  maxTextLength: 3500
  sendLongCodeAsFile: true
  sendDiffAsPatch: true
